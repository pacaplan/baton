name: plan-change
description: "Plan a flokay change: create, propose, spec, design, task-plan, and review"
agent: claude-code

params:
  - name: change_name
    required: true

engine:
  type: openspec
  change_param: change_name

steps:
  - id: create
    mode: shell
    command: openspec new change "{{change_name}}"

  - id: proposal
    mode: interactive
    session: new
    prompt: |
      Help me write a change proposal.
      You MUST use the flokay:propose skill.
      
      Before doing anything else, ask me to describe what this change is about and what I want to accomplish.

  - id: specs
    mode: interactive
    session: resume
    prompt: |
      Help me write the change spec.
      You MUST use the flokay:spec skill.

  - id: design
    mode: interactive
    session: resume
    prompt: |
      Help me design the change.
      You MUST use the flokay:design skill.

  - id: tasks
    mode: interactive
    session: resume
    prompt: |
      Help me plan tasks for the change.
      You MUST use the flokay:plan-tasks skill.

  - id: review
    workflow: run-gauntlet.yaml
