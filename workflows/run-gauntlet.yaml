name: run-gauntlet
description: "Counted retry loop: run gauntlet, fix on failure, max 3 attempts"
agent: claude-code

steps:
  - id: gauntlet-retry
    loop:
      max: 3
    steps:
      - id: run-gauntlet
        mode: shell
        command: agent-gauntlet run --report --enable-review task-compliance
        capture: gauntlet_output
        continue_on_failure: true
        break_if: success

      - id: fix-violations
        mode: headless
        session: inherit
        prompt: |
          The gauntlet verification found failures. Fix them.

          Fix issues you reasonably agree with or believe the human wants
          fixed. Skip issues that are purely stylistic or subjective.
          When you skip, briefly state why.

          For CHECK failures: fix the code following the instructions
          provided. Re-run the check command shown to verify your fix
          before moving on. If a fix skill is named, invoke it instead.
          For REVIEW violations: fix the code, then mark it:
            agent-gauntlet update-review fix <#> "what you did"
          To skip a review violation:
            agent-gauntlet update-review skip <#> "why"
          Read the full log file if the summary lacks context.

          When you are done fixing, commit your changes with a clear,
          descriptive commit message. Then summarize to the user what
          you fixed, what you skipped, and why.

          {{gauntlet_output}}
        skip_if: previous_success
        continue_on_failure: true
