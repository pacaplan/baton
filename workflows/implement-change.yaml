name: implement-change
description: "For-each loop over task files, invoking implement-task per task"
agent: claude-code

params:
  - name: change_name
    required: true

steps:
  - id: implement-tasks
    loop:
      over: "openspec/changes/{{change_name}}/tasks/*.task.md"
      as: task_file
    steps:
      - id: implement-single-task
        workflow: implement-task.yaml
        params:
          task_file: "{{task_file}}"
