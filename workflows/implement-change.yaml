name: implement-change
description: "For-each loop over task files, invoking implement-task per task"
agent: claude-code

params:
  - name: change_name
    required: true
  - name: task_files
    required: true

steps:
  - id: implement-tasks
    loop:
      over: task_files
      as: task_file
    steps:
      - id: implement-single-task
        workflow: workflows/implement-task.yaml
        params:
          task_file: "{{task_file}}"
