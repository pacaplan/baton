name: flokay
description: "Full flokay change lifecycle"
agent: claude-code

params:
  - name: change_name
    required: true
  - name: idea_file
    required: false

engine:
  type: openspec
  change_param: change_name

steps:
  - id: plan
    workflow: plan-change.yaml
    params:
      change_name: "{{change_name}}"
      idea_file: "{{idea_file}}"

  - id: implement
    workflow: implement-change.yaml
    params:
      change_name: "{{change_name}}"
