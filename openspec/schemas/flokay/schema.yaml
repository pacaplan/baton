name: flokay
version: 1
description: Flokay workflow - proposal → specs → design → tasks → review

artifacts:
  - id: proposal
    requires: []
    template: proposal.md
    generates: proposal.md
    description: Initial proposal document outlining the change

  - id: specs
    requires: [proposal]
    template: spec.md
    generates: "specs/**/*.md"
    description: Detailed specifications for the change

  - id: design
    requires: [specs]
    template: design.md
    generates: design.md
    description: Technical design document with implementation details

  - id: tasks
    requires: [design]
    template: tasks.md
    generates: tasks.md
    description: Implementation checklist with trackable tasks

  - id: review
    requires: [tasks]
    template: review.md
    generates: review.md
    description: Pre-implementation change review — validates design artifacts are coherent and ready for implementation
